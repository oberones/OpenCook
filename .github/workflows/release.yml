name: Release

on:
  push:
    branches:
      - main
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to publish as a release"
        required: true
        type: string

permissions:
  contents: read

jobs:
  resolve-release:
    name: Resolve release tag
    runs-on: ubuntu-latest
    outputs:
      release: ${{ steps.resolve.outputs.release }}
      tags: ${{ steps.resolve.outputs.tags }}
    steps:
      - name: Check out repository history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch main and tags
        run: |
          git fetch --force --tags origin
          git fetch --force origin main:refs/remotes/origin/main

      - name: Resolve release tag
        id: resolve
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag }}
          PUSH_BEFORE: ${{ github.event.before }}
        run: |
          set -euo pipefail

          tags=()
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tags+=("${INPUT_TAG}")
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tags+=("${GITHUB_REF_NAME}")
          elif [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            # Branch pushes publish releases for tags that became reachable from
            # main in this push. Tag pushes remain the normal release path.
            before="${PUSH_BEFORE}"
            if [[ "${before}" =~ ^0+$ ]]; then
              mapfile -t tags < <(git tag --merged "${GITHUB_SHA}" | sort -V)
            else
              mapfile -t tags < <(git tag --merged "${GITHUB_SHA}" --no-merged "${before}" | sort -V)
            fi
          fi

          if [[ "${#tags[@]}" -eq 0 ]]; then
            echo "No release tag found for this event; skipping release."
            {
              echo "release=false"
              echo "tags=[]"
            } >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          release_tags=()
          for tag in "${tags[@]}"; do
            if [[ -z "${tag}" ]]; then
              continue
            fi
            if ! git rev-parse --verify --quiet "refs/tags/${tag}" >/dev/null; then
              echo "Tag ${tag} does not exist in this repository." >&2
              exit 1
            fi

            commit="$(git rev-list -n 1 "${tag}^{commit}")"
            if ! git merge-base --is-ancestor "${commit}" refs/remotes/origin/main; then
              echo "Tag ${tag} points to ${commit}, which is not reachable from origin/main; skipping release."
              continue
            fi
            release_tags+=("${tag}")
          done

          if [[ "${#release_tags[@]}" -eq 0 ]]; then
            {
              echo "release=false"
              echo "tags=[]"
            } >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          tag_json="$(printf '%s\n' "${release_tags[@]}" | jq -R -s -c 'split("\n")[:-1]')"
          {
            echo "release=true"
            echo "tags=${tag_json}"
          } >> "${GITHUB_OUTPUT}"

  publish-release:
    name: Build and publish release
    needs: resolve-release
    if: needs.resolve-release.outputs.release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: release-${{ matrix.tag }}
      cancel-in-progress: false
    strategy:
      fail-fast: false
      matrix:
        tag: ${{ fromJSON(needs.resolve-release.outputs.tags) }}
    env:
      GH_TOKEN: ${{ github.token }}
      TAG_NAME: ${{ matrix.tag }}
    steps:
      - name: Check out release tag
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ env.TAG_NAME }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Resolve build metadata
        shell: bash
        run: |
          set -euo pipefail
          commit="$(git rev-list -n 1 "${TAG_NAME}^{commit}")"
          {
            echo "COMMIT=${commit}"
            echo "VERSION=${TAG_NAME#v}"
          } >> "${GITHUB_ENV}"

      - name: Verify
        run: |
          set -euo pipefail
          test -z "$(gofmt -l .)"
          go vet ./...
          go test ./...

      - name: Build release archives
        shell: bash
        run: |
          set -euo pipefail

          built_at="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          ldflags="-s -w -X github.com/oberones/OpenCook/internal/version.Version=${VERSION} -X github.com/oberones/OpenCook/internal/version.Commit=${COMMIT} -X github.com/oberones/OpenCook/internal/version.BuiltAt=${built_at}"
          safe_tag="$(printf '%s' "${TAG_NAME}" | tr -c '[:alnum:]._-' '-')"

          rm -rf dist build/release
          mkdir -p dist build/release

          targets=(
            "linux amd64"
            "linux arm64"
            "darwin amd64"
            "darwin arm64"
            "windows amd64"
          )

          for target in "${targets[@]}"; do
            read -r goos goarch <<< "${target}"
            name="opencook_${safe_tag}_${goos}_${goarch}"
            workdir="build/release/${name}"
            binary="opencook"
            if [[ "${goos}" == "windows" ]]; then
              binary="opencook.exe"
            fi

            mkdir -p "${workdir}"
            GOOS="${goos}" GOARCH="${goarch}" CGO_ENABLED=0 go build -trimpath -ldflags "${ldflags}" -o "${workdir}/${binary}" ./cmd/opencook
            cp README.md LICENSE NOTICE "${workdir}/"
            tar -czf "dist/${name}.tar.gz" -C "${workdir}" .
          done

          sha256sum dist/*.tar.gz > dist/SHA256SUMS

      - name: Publish GitHub release
        shell: bash
        run: |
          set -euo pipefail

          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            gh release upload "${TAG_NAME}" dist/* --clobber
          else
            gh release create "${TAG_NAME}" dist/* \
              --target "${COMMIT}" \
              --title "OpenCook ${TAG_NAME}" \
              --generate-notes \
              --verify-tag
          fi
