name: opencook-functional

services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:17-alpine}
    environment:
      POSTGRES_USER: opencook
      POSTGRES_PASSWORD: opencook
      POSTGRES_DB: opencook
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opencook -d opencook"]
      interval: 5s
      timeout: 3s
      retries: 24
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - opencook-functional

  opensearch:
    image: ${OPENSEARCH_IMAGE:-opensearchproject/opensearch:3.5.0}
    environment:
      discovery.type: single-node
      DISABLE_INSTALL_DEMO_CONFIG: "true"
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_JAVA_OPTS: -Xms512m -Xmx512m
      bootstrap.memory_lock: "true"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200 >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 30
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    networks:
      - opencook-functional

  opencook:
    build:
      context: ../..
      target: runtime
      args:
        VERSION: ${OPENCOOK_IMAGE_VERSION:-functional}
        COMMIT: ${OPENCOOK_IMAGE_COMMIT:-local}
        BUILT_AT: ${OPENCOOK_IMAGE_BUILT_AT:-unknown}
    environment:
      OPENCOOK_SERVICE_NAME: opencook
      OPENCOOK_ENV: functional
      OPENCOOK_LISTEN_ADDRESS: :4000
      OPENCOOK_DEFAULT_ORGANIZATION: ${OPENCOOK_FUNCTIONAL_ORG:-ponyville}
      OPENCOOK_BOOTSTRAP_MODE: "true"
      OPENCOOK_BOOTSTRAP_REQUESTOR_NAME: ${OPENCOOK_FUNCTIONAL_ACTOR_NAME:-pivotal}
      OPENCOOK_BOOTSTRAP_REQUESTOR_TYPE: user
      OPENCOOK_BOOTSTRAP_REQUESTOR_KEY_ID: ${OPENCOOK_FUNCTIONAL_ACTOR_KEY_ID:-default}
      OPENCOOK_BOOTSTRAP_PUBLIC_KEY_PATH: /etc/opencook/bootstrap_public.pem
      OPENCOOK_POSTGRES_DSN: postgres://opencook:opencook@postgres:5432/opencook?sslmode=disable
      OPENCOOK_OPENSEARCH_URL: http://opensearch:9200
      OPENCOOK_BLOB_BACKEND: filesystem
      OPENCOOK_BLOB_STORAGE_URL: file:///var/lib/opencook/blobs
      OPENCOOK_AUTH_SKEW: 15m
      OPENCOOK_MAX_AUTH_BODY_BYTES: "10485760"
      OPENCOOK_MAX_BLOB_UPLOAD_BYTES: "10485760"
    depends_on:
      postgres:
        condition: service_healthy
      opensearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4000/readyz >/dev/null"]
      interval: 5s
      timeout: 3s
      start_period: 10s
      retries: 24
    ports:
      - "${OPENCOOK_FUNCTIONAL_PORT:-4000}:4000"
    volumes:
      - opencook-blobs:/var/lib/opencook/blobs
    networks:
      - opencook-functional

  functional-tests:
    profiles:
      - test
    build:
      context: ../..
      target: functional-tests
    environment:
      OPENCOOK_FUNCTIONAL_BASE_URL: http://opencook:4000
      OPENCOOK_FUNCTIONAL_ACTOR_NAME: ${OPENCOOK_FUNCTIONAL_ACTOR_NAME:-pivotal}
      OPENCOOK_FUNCTIONAL_ACTOR_KEY_ID: ${OPENCOOK_FUNCTIONAL_ACTOR_KEY_ID:-default}
      OPENCOOK_FUNCTIONAL_PRIVATE_KEY_PATH: /src/test/functional/fixtures/bootstrap_private.pem
      OPENCOOK_FUNCTIONAL_ORG: ${OPENCOOK_FUNCTIONAL_ORG:-ponyville}
      OPENCOOK_FUNCTIONAL_STATE_DIR: /var/lib/opencook-functional
      OPENCOOK_FUNCTIONAL_PHASE: ${OPENCOOK_FUNCTIONAL_PHASE:-verify}
      OPENCOOK_ADMIN_SERVER_URL: http://opencook:4000
      OPENCOOK_ADMIN_REQUESTOR_NAME: ${OPENCOOK_FUNCTIONAL_ACTOR_NAME:-pivotal}
      OPENCOOK_ADMIN_REQUESTOR_TYPE: user
      OPENCOOK_ADMIN_PRIVATE_KEY_PATH: /src/test/functional/fixtures/bootstrap_private.pem
      OPENCOOK_ADMIN_DEFAULT_ORG: ${OPENCOOK_FUNCTIONAL_ORG:-ponyville}
      OPENCOOK_POSTGRES_DSN: postgres://opencook:opencook@postgres:5432/opencook?sslmode=disable
      OPENCOOK_OPENSEARCH_URL: http://opensearch:9200
      OPENCOOK_BOOTSTRAP_REQUESTOR_NAME: ${OPENCOOK_FUNCTIONAL_ACTOR_NAME:-pivotal}
      OPENCOOK_BOOTSTRAP_REQUESTOR_TYPE: user
      GOCACHE: /tmp/opencook-go-cache
    depends_on:
      opencook:
        condition: service_healthy
    volumes:
      - functional-state:/var/lib/opencook-functional
    networks:
      - opencook-functional

networks:
  opencook-functional:
    name: ${OPENCOOK_FUNCTIONAL_NETWORK:-opencook-functional}

volumes:
  postgres-data:
  opensearch-data:
  opencook-blobs:
  functional-state:
